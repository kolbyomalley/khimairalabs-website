user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/css
        text/javascript
        text/plain
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers — SSL/HSTS added by the gateway Caddy layer
        add_header X-Frame-Options            "DENY"                                     always;
        add_header X-Content-Type-Options     "nosniff"                                  always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"          always;
        add_header Permissions-Policy         "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy    "default-src 'self'; font-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; connect-src 'none'; frame-src 'none'; object-src 'none'" always;

        # HTML — never cache (allows instant deploys)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Static assets — cache one year (filenames are content-addressed)
        location ~* \.(css|js|woff2|woff|svg|ico|png|jpg|jpeg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
